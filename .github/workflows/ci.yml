name: ci

# Runs from the repo root (Workshop/). The code lives in mvpflow-ai/, so each
# job runs there. GitHub Actions only executes workflows under
# <repo-root>/.github/workflows/.

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvpflow-ai
    env:
      USE_LLM: "false"   # deterministic; CI never makes live model calls
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: pytest -q

  docker-build:
    # Verifies the Dockerfile actually builds (previously only claimed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mvpflow-ai:ci .
        working-directory: mvpflow-ai

  migrations-postgres:
    # Verifies the schema/migrations work on PostgreSQL, not just SQLite.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvpflow-ai
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mvpflow
          POSTGRES_PASSWORD: mvpflow
          POSTGRES_DB: mvpflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://mvpflow:mvpflow@localhost:5432/mvpflow
      USE_LLM: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt psycopg2-binary
      - run: alembic upgrade head            # create the schema on Postgres
      - run: alembic current                 # confirm head is applied

  security:
    # Advisory dependency + static security scans (see SECURITY.md). Does not
    # block the build, findings are surfaced for review, not enforced here.
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: mvpflow-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pip-audit bandit
      - run: pip-audit -r requirements.txt || true
      - run: bandit -c pyproject.toml -r app -ll
