# Alembic configuration.
# The database URL is set at runtime from app.config in alembic/env.py, so the
# sqlalchemy.url below is only a placeholder and is intentionally overridden.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./mvpflow_dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
